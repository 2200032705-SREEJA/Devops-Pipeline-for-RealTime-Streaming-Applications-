name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest kafka-python fastapi uvicorn

      - name: Run unit & integration tests
        run: |
          pytest tests/ -v --tb=short

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build producer image
        run: docker build -t spotify-producer:latest ./producer

      - name: Build consumer image
        run: docker build -t spotify-consumer:latest ./consumer

  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push producer
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spotify-producer:latest

      - name: Build and push consumer
        uses: docker/build-push-action@v5
        with:
          context: ./consumer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spotify-consumer:latest
